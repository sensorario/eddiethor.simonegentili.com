title: "TypeScript"
author: "Simone Gentili"
isbn: "000-0-00-000006-0"
backCover: >
  Questo volume illustra gli argomenti principali di TypeScript: dal
  sistema dei tipi alla programmazione ad oggetti, dai moduli ai generics
  fino agli utility types. Pensato per chi parte quasi da zero ma
  possiede già le basi di JavaScript, accompagna il lettore con un
  percorso colloquiale e diretto verso lo sviluppo di applicazioni web
  moderne con TypeScript. Non tratta ogni singolo argomento del
  linguaggio, ma le sue basi e le ultime novità, con esempi di codice
  pratici ad ogni passo.
otherBooks: []
